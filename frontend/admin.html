<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard | Mother & Toddler</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Admin Login Section -->
  <div id="adminLoginSection" class="admin-container login-container">
    <div class="admin-card">
      <div class="brand-header">
        <h1>Mother & Toddler</h1>
        <p>Admin Portal</p>
      </div>
      <form id="adminLoginForm">
        <div class="form-group">
          <label>Admin Email</label>
          <input type="email" id="adminEmail" required placeholder="admin@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="adminPassword" required placeholder="••••••••" />
        </div>
        <button type="submit" id="adminLoginBtn" class="btn btn-primary">Login to Dashboard</button>
        <p class="back-link"><a href="/">← Back to Storefront</a></p>
      </form>
    </div>
  </div>

  <!-- Admin Dashboard Section -->
  <div id="adminDashboardSection" class="admin-dashboard" style="display: none;">
    
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Admin Panel</h2>
      </div>
      <ul class="sidebar-nav">
        <li><a href="#" class="nav-item active" data-tab="orders">📦 Orders</a></li>
        <li><a href="#" class="nav-item" data-tab="products">🏷️ Add Product</a></li>
      </ul>
      <div class="sidebar-footer">
        <button id="adminLogoutBtn" class="btn btn-secondary">Logout</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      
      <!-- Orders Tab -->
      <section id="ordersTab" class="tab-content active">
        <div class="header-flex">
          <h2>Day-to-Day Orders</h2>
          <button id="refreshOrdersBtn" class="btn btn-primary-outline">Refresh</button>
        </div>
        <div class="table-responsive">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Order ID</th>
                <th>Date</th>
                <th>Customer</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="adminOrdersTableBody">
              <tr>
                <td colspan="6" style="text-align: center; padding: 20px;">Loading orders...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <!-- Products Tab -->
      <section id="productsTab" class="tab-content" style="display: none;">
        <h2>Add New Product</h2>
        <div class="admin-card">
          <form id="adminAddProductForm" class="product-form">
            <div class="form-group">
              <label>Product Name</label>
              <input type="text" id="adminProductName" required placeholder="e.g. Wooden Toy">
            </div>
            
            <div class="form-row">
              <div class="form-group">
                <label>Price (₹)</label>
                <input type="number" id="adminProductPrice" required placeholder="999">
              </div>
              <div class="form-group">
                <label>Original Price (₹)</label>
                <input type="number" id="adminProductOriginalPrice" placeholder="1299">
              </div>
            </div>
            
            <div class="form-row">
              <div class="form-group">
                <label>Category</label>
                <select id="adminProductCategory" required>
                  <option value="Baby Toys">Baby Toys</option>
                  <option value="Baby Dresses">Baby Dresses</option>
                  <option value="Feeding Accessories">Feeding Accessories</option>
                  <option value="Baby Basics">Baby Basics</option>
                  <option value="Baby Grooming Products">Baby Grooming Products</option>
                  <option value="Educational Toys">Educational Toys</option>
                  <option value="Maternity Wear">Maternity Wear</option>
                  <option value="Other">Other</option>
                </select>
              </div>
              <div class="form-group">
                <label>Age Group</label>
                <select id="adminProductAgeGroup" required>
                  <option value="0-1">Newborns (0 - 1 Years)</option>
                  <option value="1-3">Toddlers (1 - 3 Years)</option>
                  <option value="3-6">Preschoolers (3 - 6 Years)</option>
                  <option value="6-10">Big Kids (6 - 10 Years)</option>
                  <option value="All">All Ages</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label>Product Description</label>
              <textarea id="adminProductDescription" required rows="3" placeholder="Description..."></textarea>
            </div>
            
            <div class="form-group">
              <label>Product Image</label>
              <div class="file-drop-area">
                <input type="file" id="adminProductImage" required accept="image/*">
              </div>
            </div>
            
            <div class="checkbox-group">
              <label class="checkbox-label">
                <input type="checkbox" id="adminProductInStock" checked> In Stock
              </label>
              <label class="checkbox-label">
                <input type="checkbox" id="adminProductIsNew" checked> New Product
              </label>
              <label class="checkbox-label">
                <input type="checkbox" id="adminProductIsSale"> On Sale
              </label>
            </div>

            <button type="submit" class="btn btn-primary" id="adminSubmitBtn">Publish Product</button>
          </form>
        </div>
      </section>

    </main>
  </div>

  <!-- API helpers and Admin Logic -->
  <script type="module" src="admin.js"></script>
</body>
</html>
